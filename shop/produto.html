<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="titulo-pagina">Produto — OSSO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/produto.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="logo">OSSO</a>
    <ul class="nav-links">
      <li><a href="produtos.html">Catálogo</a></li>
      <li><a href="produtos.html?categoria=masculino">Masculino</a></li>
      <li><a href="produtos.html?categoria=feminino">Feminino</a></li>
      <li><a href="produtos.html?promo=1">Promoções</a></li>
    </ul>
    <div class="nav-actions">
      <button id="btn-abrir-carrinho" class="nav-icon-btn" aria-label="Carrinho">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M6 7h15l-1.5 10.5a2 2 0 0 1-2 1.5H8.5a2 2 0 0 1-2-1.5L5 4H2"/><circle cx="9" cy="21" r="1"/><circle cx="18" cy="21" r="1"/></svg>
        <span id="carrinho-contador" class="cart-badge">0</span>
      </button>
    </div>
  </div>
</nav>

<nav class="breadcrumb container" id="breadcrumb"></nav>

<div id="produto-container" class="container produto-container">
  <!-- Preenchido via JS -->
</div>

<section class="container secao-relacionados">
  <div class="tag-divider">
    <span class="tag-label">Você também pode gostar</span>
    <span class="tag-stitch"></span>
  </div>
  <div id="grid-relacionados" class="produtos-grid"></div>
</section>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <span>© 2026 OSSO. Projeto de portfólio.</span>
      <a href="produtos.html">Voltar ao catálogo</a>
    </div>
  </div>
</footer>

<div id="carrinho-overlay" class="carrinho-overlay"></div>
<aside id="carrinho-drawer" class="carrinho-drawer">
  <div class="carrinho-header">
    <h3>Seu carrinho</h3>
    <button id="btn-fechar-carrinho" class="btn-fechar">×</button>
  </div>
  <div id="carrinho-lista" class="carrinho-lista"></div>
  <p id="carrinho-vazio">Seu carrinho está vazio.</p>
  <div class="carrinho-footer">
    <div class="carrinho-subtotal-row">
      <span>Subtotal</span>
      <strong id="carrinho-subtotal">R$ 0,00</strong>
    </div>
    <a href="#" class="btn btn-primary btn-block" onclick="alert('Checkout fora do escopo deste projeto de portfólio.'); return false;">Finalizar compra</a>
  </div>
</aside>

<script src="js/data.js"></script>
<script src="js/cart.js"></script>
<script src="js/components.js"></script>
<script src="js/produto.js"></script>
</body>
</html>
